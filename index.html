<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="description" content="Un desktop portfolio personal para iOS Stefano: Swift, desarrollo iOS, proyectos, producto digital y ecosistema Apple." />
  <meta name="theme-color" content="#0B0D12" />

  <!-- Open Graph -->
  <meta property="og:title" content="iOS Stefano — Desktop Portfolio" />
  <meta property="og:description" content="Entra al ecosistema personal de iOS Stefano. Swift, proyectos iOS, desarrollo y producto digital." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://iostephano.github.io" />
  <meta property="og:image" content="assets/wallpapers/wallpaper-current.png" />

  <title>iOS Stefano — Desktop Portfolio</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="desktop" id="desktop">

    <div class="desktop-overlay" aria-hidden="true"></div>

    <div class="desktop-widget" id="desktopWidget" aria-hidden="true">
      <div class="desktop-widget-track" id="widgetTrack"></div>
    </div>

    <div class="desktop-files" id="desktopFiles"></div>

    <div class="windows-layer" id="windowsLayer"></div>

    <nav class="dock" aria-label="Main navigation">
      <ul class="dock-list" id="dockList" role="list">
        <!-- Populated by script.js -->
      </ul>
    </nav>

  </div>

  <script src="script.js"></script>
</body>
</html>
